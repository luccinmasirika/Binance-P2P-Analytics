name: Scrape Binance P2P

# Cron is delegated to cron-job.org (free, unlimited) which calls POST /api/scrape
# on Vercel every 10 min. This workflow is kept only for manual runs via the
# GitHub UI (workflow_dispatch). Re-enable the `schedule:` block below if you
# ever want to fall back to GitHub Actions.
on:
  # schedule:
  #   - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm tsx src/scripts/scrape.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
